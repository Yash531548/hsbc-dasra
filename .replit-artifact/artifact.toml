kind = "web"
previewPath = "/"
title = "HSBC x Dasra Interactive Report"
version = "1.0.0"
id = "artifacts/hsbc-dasra-report"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22868

[services.development]
run = "pnpm --filter @workspace/hsbc-dasra-report run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hsbc-dasra-report", "run", "build" ]
publicDir = "artifacts/hsbc-dasra-report/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22868"
BASE_PATH = "/"
